<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 매칭 지원 - Sminside</title>
    
    <!-- [CSS Engine] 고품질 글래스모피즘 스타일 시트 연동 -->
    <!-- 코드 설명: 기업 지원 페이지도 style.css를 사용해 메인 앱과 같은 버튼, 카드, 배경 스타일을 유지합니다. -->
    <link rel="stylesheet" href="style.css">
    
    <!-- [Presentation Note]
         이 페이지는 사용자가 자신의 역량을 기업에 어필할 수 있는 '커리어 지원 시스템'의 프론트엔드 인터페이스입니다.
    -->
</head>
<body>
    <!-- 시각적 일관성을 위한 배경 시스템 -->
    <!-- 코드 설명: nebula-container는 배경 장식입니다. 안쪽의 nebula n1 클래스가 어떤 색과 위치의 빛 효과인지 결정합니다. -->
    <div class="nebula-container"><div class="nebula n1"></div></div>
    <!-- 코드 설명: stars id는 script.js의 createStars 함수가 별 효과를 넣기 위해 찾는 요소입니다. -->
    <div class="stars-canvas" id="stars"></div>

    <!-- 코드 설명: navbar id를 가진 상단 메뉴입니다. 로고를 누르면 location.href로 index.html에 이동합니다. -->
    <nav id="navbar">
        <!-- 코드 설명: location.href는 브라우저 주소를 바꾸는 JavaScript 코드입니다. 클릭하면 메인 페이지로 이동합니다. -->
        <div class="logo" onclick="location.href='index.html'">Sminside</div>
        <ul class="nav-links">
            <li><a href="index.html" style="text-decoration: none; color: inherit;">메인 허브</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="active">
            <div style="text-align: center; margin-bottom: 3rem;">
                <h1 id="appeal-title" style="font-size: 2.5rem; margin-bottom: 1rem; color: var(--accent-indigo);">기업 매칭 지원</h1>
                <p style="color: var(--text-mid);">나의 꿈과 열정을 기업에 전달하세요.</p>
            </div>

            <!-- [Support Form] 기업 지원 양식 엔지니어링 -->
            <div class="glass-card" style="max-width: 800px; margin: 0 auto;">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-mid); font-size: 0.9rem;">지원 기업</label>
                    <!-- 코드 설명: target-company 입력창은 지원 기업명을 보여줍니다. readonly라 사용자가 직접 수정하지 못하고, JavaScript가 URL에서 가져온 값을 넣습니다. -->
                    <input type="text" id="target-company" readonly style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--accent-indigo); font-weight: 800;">
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-mid); font-size: 0.9rem;">포트폴리오 링크 (GitHub / Notion)</label>
                    <!-- 코드 설명: portfolio-url은 포트폴리오 링크를 입력받는 칸입니다. submitAppeal 함수에서 이 값이 비었는지 확인합니다. -->
                    <input type="text" id="portfolio-url" placeholder="https://github.com/username" style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff;">
                </div>

                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-mid); font-size: 0.9rem;">자기소개 및 어필 (300자 내외)</label>
                    <!-- 코드 설명: appeal-content는 자기소개와 지원 내용을 여러 줄로 입력받는 영역입니다. textarea는 긴 글 작성에 적합합니다. -->
                    <textarea id="appeal-content" placeholder="기업에 전달하고 싶은 메시지를 입력하세요." style="width: 100%; height: 250px; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; resize: none;"></textarea>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <!-- 코드 설명: 지원서 제출 버튼입니다. 클릭하면 submitAppeal 함수가 실행되어 입력값 검사 후 알림을 보여줍니다. -->
                    <button class="btn btn-primary" style="flex: 1;" onclick="submitAppeal()">지원서 제출하기</button>
                    <!-- 코드 설명: history.back()은 브라우저의 뒤로 가기와 같은 기능입니다. 취소 버튼에 사용했습니다. -->
                    <button class="btn" style="flex: 1;" onclick="history.back()">취소</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
    <script>
        // [Logic] URL 파라미터에서 지원할 기업명을 추출하여 폼에 자동 입력
        // 코드 설명: window.onload는 페이지의 모든 요소가 로드된 뒤 실행됩니다. 여기서는 URL 파라미터를 읽어 기업명을 자동 입력합니다.
        window.onload = () => {
            // 코드 설명: URLSearchParams는 주소의 ?company=회사명 같은 값을 쉽게 꺼낼 수 있게 해주는 객체입니다.
            const params = new URLSearchParams(window.location.search);
            const companyName = params.get('company') || '선택된 기업 없음';
            // 코드 설명: getElementById로 target-company 입력창을 찾고, value에 기업명을 넣어 화면에 표시합니다.
            document.getElementById('target-company').value = companyName;
            
            // 기존 초기화 엔진 실행
            createStars();
            initScrollEffects();
        };

        // 코드 설명: submitAppeal은 포트폴리오 주소와 자기소개가 모두 입력되었는지 확인한 뒤 제출 흐름을 처리하는 함수입니다.
        function submitAppeal() {
            const url = document.getElementById('portfolio-url').value;
            const content = document.getElementById('appeal-content').value;
            
            if(!url || !content) {
                return alert('모든 항목을 입력해 주세요.');
            }
            
            alert('성공적으로 지원되었습니다! 해당 기업의 채용 담당자가 검토 후 연락드릴 예정입니다.');
            location.href = 'index.html';
        }
    </script>
</body>
</html>
