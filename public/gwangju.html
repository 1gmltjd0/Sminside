<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광주소프트웨어마이스터고 - Sminside</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nebula-container"><div class="nebula n3"></div></div>
    <div class="stars-canvas" id="stars"></div>

    <nav id="navbar">
        <div class="logo" onclick="location.href='index.html'">Sminside</div>
        <ul class="nav-links"><li><a href="index.html" style="text-decoration: none; color: inherit;">메인 허브</a></li></ul>
    </nav>

    <div class="container">
        <section class="active">
            <div style="text-align: center; margin-bottom: 4rem;">
                <h1 style="font-size: 3rem; margin-bottom: 1rem; color: var(--accent-emerald);">광주 SW마고 커뮤니티</h1>
                <p style="color: var(--text-mid);">실무 중심의 교육으로 내일의 개발자를 꿈꾸는 학생들의 공간입니다.</p>
            </div>
            
            <div id="post-list" style="display: flex; flex-direction: column; gap: 1.5rem;"></div>
            
            <div style="margin-top: 3rem; text-align: center;">
                <button class="btn btn-primary" style="background: var(--accent-emerald);" onclick="checkLoginForWrite()">글쓰기</button>
                <a href="http://gsm.gen.hs.kr/" target="_blank" class="btn" style="margin-left: 1rem;">공식 홈페이지</a>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => loadPosts('광주'), 100); 
        });
    </script>
</body>
</html>
