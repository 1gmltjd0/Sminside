<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - Sminside</title>
    <!-- 코드 설명: 마이페이지도 공통 CSS를 연결해 같은 테마의 카드와 버튼을 사용합니다. -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* 코드 설명: .profile-section은 프로필 이미지와 사용자 설명을 가로로 배치합니다. gap으로 두 요소 사이 간격을 만듭니다. */
        .profile-section {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* 코드 설명: .profile-img는 실제 이미지 파일 대신 원형 배경과 이모지/문자를 사용해 프로필 아이콘처럼 보이게 만든 박스입니다. */
        .profile-img {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent-color), #a855f7);
            /* 코드 설명: border-radius:50%는 정사각형 요소를 원 모양으로 만듭니다. 프로필 사진이나 아이콘에 자주 쓰입니다. */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
        }

        .profile-info h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .profile-info p {
            color: var(--text-sub);
            margin-bottom: 1rem;
        }

        /* 코드 설명: .stats-grid는 활동 통계 카드를 2칸으로 배치합니다. repeat(2, 1fr)은 같은 너비의 열 2개를 만든다는 뜻입니다. */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            text-align: center;
            padding: 1.5rem;
        }

        /* 코드 설명: .stat-value는 숫자 부분입니다. font-size와 font-weight를 크게 줘서 통계 숫자가 먼저 눈에 들어오게 합니다. */
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        /* 코드 설명: .my-posts-header는 내가 쓴 게시글 제목 영역입니다. 왼쪽 border를 강조선처럼 사용해 섹션 구분을 줍니다. */
        .my-posts-header {
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 1rem;
        }

        /* 코드 설명: .post-link는 내가 쓴 글 하나를 나타내는 링크 카드입니다. display:block으로 카드 전체가 클릭 영역이 됩니다. */
        .post-link {
            display: block;
            padding: 1.2rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            margin-bottom: 1rem;
            transition: 0.3s;
        }

        /* 코드 설명: hover 상태에서 배경을 바꾸고 오른쪽으로 살짝 움직여 사용자가 마우스를 올린 항목을 알 수 있게 합니다. */
        .post-link:hover {
            background: var(--card-hover);
            transform: translateX(10px);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Sminside</a>
        <ul class="nav-links">
            <li><a href="index.html">홈</a></li>
            <li><a href="schools.html">학교 소개</a></li>
            <li><a href="community.html">커뮤니티</a></li>
            <li><a href="mypage.html" style="color: var(--accent-color);">마이페이지</a></li>
        </ul>
    </nav>

    <div class="container">
        <!-- 프로필 섹션: 사용자의 기본 정보를 보여줌 -->
        <!-- 코드 설명: header에 glass-card와 profile-section을 같이 넣어, 카드 디자인과 프로필 가로 배치를 동시에 적용했습니다. -->
        <header class="glass-card profile-section">
            <!-- 코드 설명: 이 div는 사용자 사진 자리입니다. 실제 이미지가 없어도 원형 아이콘으로 프로필 영역을 구성할 수 있습니다. -->
            <div class="profile-img">👤</div>
            <div class="profile-info">
                <h2>김예준 <span style="font-size: 1rem; color: var(--text-sub); font-weight: 400;">(대덕SW마고)</span></h2>
                <p>안녕하세요! 백엔드 개발자를 꿈꾸는 1학년 김예준입니다. 열심히 공부 중이에요!</p>
                <!-- 코드 설명: 정보 수정 버튼입니다. class="btn"으로 공통 버튼 모양을 적용했지만, 실제 수정 기능은 아직 연결하지 않았습니다. -->
                <button class="btn" style="padding: 0.5rem 1rem; font-size: 0.85rem;">정보 수정</button>
            </div>
        </header>

        <!-- 활동 통계: 내가 쓴 글과 댓글 수를 시각적으로 보여줌 -->
        <!-- 코드 설명: 사용자의 작성 글 수와 댓글 수를 작은 카드 두 개로 보여주는 통계 영역입니다. -->
        <div class="stats-grid">
            <div class="glass-card stat-card">
                <div class="stat-value">12</div>
                <div class="stat-label">작성한 글</div>
            </div>
            <div class="glass-card stat-card">
                <div class="stat-value">8</div>
                <div class="stat-label">작성한 댓글</div>
            </div>
        </div>

        <!-- 내가 쓴 게시글 목록: 클릭하면 해당 글로 이동할 수 있게 함 -->
        <section>
            <div class="my-posts-header">
                <h3>내가 쓴 게시글</h3>
            </div>
            
            <!-- 코드 설명: href="#"는 아직 실제 이동할 게시글 주소가 없을 때 임시로 사용하는 링크입니다. class="post-link"로 카드처럼 꾸밉니다. -->
            <a href="#" class="post-link">
                <div style="font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.5rem;">자유 게시판</div>
                <div style="font-weight: 600;">안녕하세요 대덕입니다! 반가워요</div>
                <div style="font-size: 0.8rem; color: var(--text-sub); margin-top: 0.5rem;">2026.05.20</div>
            </a>

            <a href="#" class="post-link">
                <div style="font-size: 0.8rem; color: var(--accent-color); margin-bottom: 0.5rem;">질문 게시판</div>
                <div style="font-weight: 600;">HTML이랑 CSS 너무 어려워요ㅠㅠ</div>
                <div style="font-size: 0.8rem; color: var(--text-sub); margin-top: 0.5rem;">2026.05.15</div>
            </a>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Sminside. 제작자: 김예준 (대덕SW마고)</p>
    </footer>

</body>
</html>
