<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Sminside</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none; /* 일단은 안 보이게 설정 */
        }

        .login-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .login-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Sminside</a>
        <ul class="nav-links">
            <li><a href="index.html">홈</a></li>
            <li><a href="schools.html">학교 소개</a></li>
            <li><a href="community.html">커뮤니티</a></li>
            <li><a href="login.html" style="color: var(--accent-color);">로그인</a></li>
        </ul>
    </nav>

    <div class="container login-container">
        <!-- 로그인 카드: 깔끔하게 중앙에 배치함 -->
        <div class="glass-card login-card">
            <h2 style="margin-bottom: 2rem;">로그인</h2>
            
            <form action="mypage.html"> <!-- 로그인 성공 시 마이페이지로 이동한다고 가정 -->
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" placeholder="아이디를 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <!-- 오류 메시지 영역: 나중에 자바스크립트로 제어할 부분 -->
                <div class="error-msg">아이디 또는 비밀번호가 일치하지 않습니다.</div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">로그인</button>
            </form>

            <div class="login-footer">
                <p>계정이 없으신가요? <a href="register.html">회원가입 하기</a></p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Sminside. 제작자: 김예준 (대덕SW마고)</p>
    </footer>

</body>
</html>
