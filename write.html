<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - Sminside</title>
    <!-- 코드 설명: 글쓰기 화면의 버튼, 카드, 배경 스타일을 공통 CSS에서 가져옵니다. -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 코드 설명: nav는 페이지 이동 메뉴입니다. 글을 쓰다가도 홈, 학교소개, 커뮤니티, 로그인 페이지로 이동할 수 있습니다. -->
    <nav>
        <a href="index.html" class="logo">Sminside</a>
        <ul class="nav-links">
            <li><a href="index.html">홈</a></li>
            <li><a href="schools.html">학교 소개</a></li>
            <li><a href="community.html">커뮤니티</a></li>
            <li><a href="login.html">로그인</a></li>
        </ul>
    </nav>
    <!-- 코드 설명: container는 본문 폭을 제한하고 가운데 정렬하는 레이아웃 클래스입니다. 글쓰기 폼이 너무 넓어지는 것을 막습니다. -->
    <div class="container">
        <h1>새 글 작성</h1>
        <!-- 코드 설명: glass-card는 입력 폼을 카드처럼 묶어 보여줍니다. style의 margin-top은 제목과 카드 사이 간격을 만듭니다. -->
        <div class="glass-card" style="margin-top: 2rem;">
            <!-- 코드 설명: input type="text"는 게시글 제목처럼 한 줄짜리 값을 입력받는 태그입니다. style에서 width:100%로 카드 너비 전체를 사용합니다. -->
            <input type="text" placeholder="제목을 입력하세요" style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white; margin-bottom: 1rem;">
            <!-- 코드 설명: textarea는 게시글 본문처럼 여러 줄을 입력받을 때 사용합니다. height:300px로 충분한 작성 공간을 만들었습니다. -->
            <textarea placeholder="내용을 입력하세요" style="width: 100%; height: 300px; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 8px; color: white; margin-bottom: 1rem;"></textarea>
            <!-- 코드 설명: text-align:right를 사용해 등록 버튼을 카드 오른쪽 끝에 배치합니다. -->
            <div style="text-align: right;">
                <!-- 코드 설명: button은 사용자가 누르는 버튼 태그입니다. class="btn"으로 공통 버튼 디자인을 적용했지만 실제 저장 기능은 아직 연결하지 않았습니다. -->
                <button class="btn">등록하기</button>
            </div>
        </div>
    </div>
</body>
</html>
